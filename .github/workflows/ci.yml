name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo build --workspace --no-default-features
      - run: cargo test --workspace --no-default-features

  bundle-check:
    needs: build-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build GUI release binary
        run: cargo build --release -p csm-gui

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Verify packaging config
        run: cargo bundle --release -p csm-gui

  mac-xcframework:
    needs: build-and-test
    runs-on: macos-14
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add darwin targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build XCFramework
        run: ./apps/mac/build-xcframework.sh

      - name: Swift build
        working-directory: apps/mac
        run: swift build

      - name: Swift test
        working-directory: apps/mac
        run: swift test

      - name: Smoke-test csmctl CLI
        working-directory: apps/mac
        # Point at a loopback address nothing is listening on — the CLI should
        # still connect, fail to reach the server, and exit cleanly after the
        # duration.
        run: swift run csmctl --server http://127.0.0.1:1 --duration 2

      - name: Assemble CsmMac.app
        run: ./apps/mac/build-app.sh

      - name: Verify .app bundle structure
        run: |
          set -e
          ls -R apps/mac/build/CsmMac.app
          test -x apps/mac/build/CsmMac.app/Contents/MacOS/CsmMac
          test -f apps/mac/build/CsmMac.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Print :LSUIElement" apps/mac/build/CsmMac.app/Contents/Info.plist | grep -q true
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" apps/mac/build/CsmMac.app/Contents/Info.plist | grep -q "com.claude-session-monitor.csm-mac"
