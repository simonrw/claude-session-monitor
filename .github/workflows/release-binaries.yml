name: Release Binaries

on:
  release:
    types: [published]

jobs:
  build:
    # common is an internal library crate with no binary to release.
    # csm-mac-* tags are handled by release-mac-app.yml (different build
    # pipeline — XCFramework + SwiftPM + DMG).
    if: >
      !startsWith(github.event.release.tag_name, 'common-') &&
      !startsWith(github.event.release.tag_name, 'csm-mac-')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Extract crate name from tag
        id: crate
        # Tags are formatted as "<crate>-v<version>", e.g. "server-v0.2.0"
        run: echo "name=$(echo '${{ github.event.release.tag_name }}' | sed 's/-v[0-9].*//')" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --release -p ${{ steps.crate.outputs.name }}

      - name: Rename binary with target suffix
        run: |
          src="target/release/${{ steps.crate.outputs.name }}"
          dst="${{ steps.crate.outputs.name }}-${{ matrix.target }}"
          mv "$src" "$dst"
          echo "ASSET=$dst" >> "$GITHUB_ENV"

      - name: Upload binary to release
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.ASSET }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-bundle
        if: matrix.os == 'macos-latest' && steps.crate.outputs.name == 'csm-gui'
        run: cargo install cargo-bundle

      - name: Create macOS .app bundle
        if: matrix.os == 'macos-latest' && steps.crate.outputs.name == 'csm-gui'
        run: cargo bundle --release -p csm-gui

      - name: Create and upload .dmg
        if: matrix.os == 'macos-latest' && steps.crate.outputs.name == 'csm-gui'
        run: |
          mkdir dmg-staging
          cp -r "target/release/bundle/osx/Claude Session Monitor.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Claude Session Monitor" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "Claude-Session-Monitor.dmg"
          gh release upload "${{ github.event.release.tag_name }}" "Claude-Session-Monitor.dmg" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-bundle
        if: matrix.os == 'ubuntu-latest' && steps.crate.outputs.name == 'csm-gui'
        run: cargo install cargo-bundle

      - name: Create Linux .deb package
        if: matrix.os == 'ubuntu-latest' && steps.crate.outputs.name == 'csm-gui'
        run: cargo bundle --release -p csm-gui

      - name: Upload .deb to release
        if: matrix.os == 'ubuntu-latest' && steps.crate.outputs.name == 'csm-gui'
        run: |
          deb_file=$(find target/release/bundle/deb -name '*.deb' | head -1)
          gh release upload "${{ github.event.release.tag_name }}" "$deb_file" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
